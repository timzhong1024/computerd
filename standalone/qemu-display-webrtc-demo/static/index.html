<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QEMU Display WebRTC Demo</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101418;
        --panel: #181f26;
        --text: #f4f7fb;
        --muted: #9fb0c0;
        --accent: #5ac8fa;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(circle at top right, rgba(90, 200, 250, 0.16), transparent 24%),
          linear-gradient(180deg, #0d1117, var(--bg));
        color: var(--text);
      }

      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 32px 20px 56px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: clamp(28px, 3vw, 42px);
        line-height: 1.05;
      }

      p {
        color: var(--muted);
        margin: 0 0 12px;
      }

      .stage {
        margin-top: 28px;
        border-radius: 18px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: var(--panel);
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #05080c;
      }

      .status {
        display: flex;
        gap: 12px;
        padding: 12px 16px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        font-size: 14px;
      }

      code {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>QEMU Display WebRTC Demo</h1>
      <p>Single-viewer demo page for validating QEMU display to WebRTC playback.</p>
      <p id="headline">Connecting to <code>/ws</code>…</p>
      <section class="stage">
        <video id="video" autoplay playsinline muted></video>
        <div class="status">
          <span id="state">State: booting</span>
          <span id="ice">ICE: idle</span>
        </div>
      </section>
    </main>
    <script>
      const video = document.getElementById("video");
      const headline = document.getElementById("headline");
      const stateLabel = document.getElementById("state");
      const iceLabel = document.getElementById("ice");

      const protocol = location.protocol === "https:" ? "wss" : "ws";
      const websocket = new WebSocket(`${protocol}://${location.host}/ws`);
      const peer = new RTCPeerConnection();

      peer.ontrack = (event) => {
        if (event.streams[0]) {
          video.srcObject = event.streams[0];
        }
      };

      peer.onicecandidate = (event) => {
        if (!event.candidate) {
          return;
        }
        websocket.send(
          JSON.stringify({
            type: "ice",
            candidate: {
              candidate: event.candidate.candidate,
              sdpMLineIndex: event.candidate.sdpMLineIndex,
              sdpMid: event.candidate.sdpMid,
            },
          }),
        );
      };

      peer.oniceconnectionstatechange = () => {
        iceLabel.textContent = `ICE: ${peer.iceConnectionState}`;
      };

      websocket.addEventListener("open", () => {
        stateLabel.textContent = "State: signaling";
        headline.textContent = "Waiting for server offer…";
      });

      websocket.addEventListener("message", async (event) => {
        const message = JSON.parse(event.data);
        if (message.type === "offer") {
          await peer.setRemoteDescription({ type: "offer", sdp: message.sdp });
          const answer = await peer.createAnswer();
          await peer.setLocalDescription(answer);
          websocket.send(JSON.stringify({ type: "answer", sdp: answer.sdp }));
          stateLabel.textContent = "State: answer-sent";
          headline.textContent = "Offer received. Waiting for media…";
          return;
        }

        if (message.type === "ice") {
          await peer.addIceCandidate(message.candidate);
        }
      });

      websocket.addEventListener("close", () => {
        stateLabel.textContent = "State: closed";
        headline.textContent = "WebSocket closed.";
      });

      video.addEventListener("playing", () => {
        stateLabel.textContent = "State: playing";
        headline.textContent = "Playback active.";
      });
    </script>
  </body>
</html>
